<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="manifest" href="manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PTT STATION — Fleet Card</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            zIndex: { 9999: "9999", 10000: "10000", 10001: "10001" },
            animation: {
              "fade-in": "fadeIn 0.5s ease-out both",
              "slide-up": "slideUp 0.5s cubic-bezier(.22,1,.36,1) both",
              "slide-right": "slideRight 0.4s cubic-bezier(.22,1,.36,1) both",
              "pulse-soft": "pulseSoft 2s ease-in-out infinite",
              "float": "floatY 3s ease-in-out infinite",
              "ripple": "rippleScale 3s cubic-bezier(0.4,0,0.2,1) infinite",
              "glow": "glowPulse 2s ease-in-out infinite",
            },
            keyframes: {
              fadeIn: { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
              slideUp: { "0%": { opacity: "0", transform: "translateY(20px)" }, "100%": { opacity: "1", transform: "translateY(0)" } },
              slideRight: { "0%": { opacity: "0", transform: "translateX(-20px)" }, "100%": { opacity: "1", transform: "translateX(0)" } },
              pulseSoft: { "0%,100%": { transform: "scale(1)", opacity: "1" }, "50%": { transform: "scale(1.5)", opacity: "0.4" } },
              floatY: { "0%,100%": { transform: "translateY(0)" }, "50%": { transform: "translateY(-4px)" } },
              rippleScale: { "0%": { transform: "scale(0.8)", opacity: "0" }, "50%": { opacity: "0.8" }, "100%": { transform: "scale(1.4)", opacity: "0" } },
              glowPulse: { "0%,100%": { boxShadow: "0 0 8px rgba(59,130,246,0.3)" }, "50%": { boxShadow: "0 0 20px rgba(59,130,246,0.6)" } },
            },
          },
        },
      };
    </script>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- MapLibre GL JS CSS -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <link rel="icon" href="./pictures/logo.png" type="image/png" sizes="10x30" />

    <script>
      function detectDevice() {
        var userAgent = navigator.userAgent || navigator.vendor || window.opera;
        var isMobile = /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent.toLowerCase());
        if (isMobile) {
          window.location.href = "mapViewPhone.html";
        }
      }
      detectDevice();
    </script>
    <script src="main.js"></script>

    <style>
      /* ────────────────────────────────────────────────────
         BASE LAYOUT
      ──────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; }
      body, html { height: 100%; margin: 0; padding: 0; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      #map { height: 100%; width: 100%; z-index: 0; }
      .map-container { height: 100vh; width: 100vw; margin: 0; padding: 0; position: relative; overflow: hidden; }

      /* ────────────────────────────────────────────────────
         Z-INDEX MANAGEMENT
      ──────────────────────────────────────────────────── */
      .modal { z-index: 10001 !important; }
      .modal-backdrop { z-index: 10000 !important; }
      .offcanvas { z-index: 10001 !important; }
      .offcanvas-backdrop { z-index: 10000 !important; }

      /* ────────────────────────────────────────────────────
         MODAL STYLING
      ──────────────────────────────────────────────────── */
      .modal-content {
        border-radius: 1.5rem;
        border: none;
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        backdrop-filter: blur(20px);
        background: rgba(255,255,255,0.97);
        overflow: hidden;
      }
      .modal-header {
        display: flex; justify-content: space-between; align-items: center;
        border-bottom: none; padding: 1rem 1.5rem;
      }
      .modal-header img { max-width: 40%; height: auto; }
      .modal-header .btn-close {
        width: 2.25rem; height: 2.25rem; border-radius: 50%;
        background-color: rgba(0,0,0,0.06); opacity: 1;
        transition: all 0.2s ease;
      }
      .modal-header .btn-close:hover { background-color: rgba(0,0,0,0.12); transform: rotate(90deg); }
      #markerModal .btn-close {
        width: 2.5rem; height: 2.5rem; background-color: rgba(15,23,42,0.7);
        border-radius: 50%; filter: invert(1); box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      }
      .modal-header.no-border-bottom { border-bottom: none; }

      /* ────────────────────────────────────────────────────
         RIGHT FLOATING ACTION BUTTONS (FAB)
      ──────────────────────────────────────────────────── */
      .right-buttons {
        position: absolute;
        top: 50%;
        right: 16px;
        transform: translateY(-50%);
        display: flex;
        flex-direction: column;
        gap: 12px;
        z-index: 1050;
      }
      .right-buttons .fab-btn {
        width: 48px; height: 48px;
        border-radius: 16px;
        display: flex; justify-content: center; align-items: center;
        font-size: 18px; padding: 0;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255,255,255,0.5);
        box-shadow: 0 4px 16px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
        color: #334155;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        outline: none;
      }
      .right-buttons .fab-btn:hover {
        transform: scale(1.08);
        background: rgba(255,255,255,0.95);
        box-shadow: 0 8px 25px rgba(59,130,246,0.12), 0 2px 6px rgba(0,0,0,0.08);
        color: #1e40af;
      }
      .right-buttons .fab-btn:active { transform: scale(0.95); }
      .right-buttons .fab-btn.fab-danger {
        background: rgba(239,68,68,0.9);
        color: white;
        border-color: rgba(239,68,68,0.3);
      }
      .right-buttons .fab-btn.fab-danger:hover {
        background: rgba(220,38,38,0.95);
        box-shadow: 0 8px 25px rgba(239,68,68,0.3);
      }

      /* Notification dot */
      .fab-notification {
        position: absolute; top: -2px; right: -2px;
        width: 12px; height: 12px;
        background: #ef4444;
        border-radius: 50%;
        border: 2px solid white;
        animation: pulseSoft 2s ease-in-out infinite;
      }
      .notification-dot {
        position: absolute; top: -2px; right: -2px;
        width: 12px; height: 12px;
        background: #ef4444;
        border-radius: 50%;
        border: 2px solid white;
        animation: pulseSoft 2s ease-in-out infinite;
      }

      /* ────────────────────────────────────────────────────
         BRAND BADGE (Bottom Left)
      ──────────────────────────────────────────────────── */
      .brand-badge {
        position: absolute;
        bottom: 16px; left: 16px;
        display: flex; align-items: center; gap: 10px;
        background: rgba(255,255,255,0.8);
        backdrop-filter: blur(16px);
        padding: 8px 16px 8px 8px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.5);
        box-shadow: 0 4px 16px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
        z-index: 1050;
        transition: all 0.3s ease;
        animation: slideRight 0.6s cubic-bezier(.22,1,.36,1) 0.2s both;
      }
      .brand-badge:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      }
      .brand-badge img { width: 100px; height: auto; }
      .brand-badge .brand-text {
        font-size: 12px; font-weight: 700;
        color: #475569; letter-spacing: 0.5px;
      }

      /* ────────────────────────────────────────────────────
         FLEET CARD FLOATING BADGE (Top Center)
      ──────────────────────────────────────────────────── */
      .fleet-badge {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex; align-items: center; gap: 10px;
        background: rgba(255,255,255,0.92);
        backdrop-filter: blur(16px);
        padding: 10px 20px 10px 14px;
        border-radius: 50px;
        border: 1px solid rgba(255,255,255,0.5);
        box-shadow: 0 4px 20px rgba(0,0,0,0.08), 0 0 0 1px rgba(255,255,255,0.3);
        z-index: 1050;
        cursor: pointer;
        transition: all 0.4s cubic-bezier(0.33,1,0.68,1);
        animation: slideUp 0.5s cubic-bezier(.22,1,.36,1) 0.3s both;
        overflow: hidden;
      }
      .fleet-badge::before {
        content: '';
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: conic-gradient(from 0deg at 50% 50%, rgba(58,123,213,0) 0%, rgba(58,123,213,0.08) 30%, rgba(58,123,213,0) 70%, rgba(0,210,255,0.04) 100%);
        animation: rotateConic 8s linear infinite;
        z-index: -1; opacity: 0.7;
      }
      .fleet-badge:hover {
        transform: translateX(-50%) translateY(-3px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.12), 0 0 0 1px rgba(255,255,255,0.5);
      }
      .fleet-badge:hover::before { animation-duration: 4s; opacity: 1; }

      .fleet-badge .icon-core {
        position: relative;
        width: 24px; height: 24px;
        display: flex; align-items: center; justify-content: center;
      }
      .fleet-badge .icon-core .ripple-ring {
        position: absolute; width: 100%; height: 100%;
        border-radius: 50%; border: 2px solid rgba(0,210,255,0.3);
        animation: rippleScale 3s cubic-bezier(0.4,0,0.2,1) infinite;
        box-sizing: border-box;
      }
      .fleet-badge .icon-core .ripple-ring:nth-child(2) { animation-delay: 1s; border-color: rgba(58,123,213,0.3); }
      .fleet-badge .icon-core .ripple-ring:nth-child(3) { animation-delay: 2s; border-color: rgba(0,210,255,0.2); }
      .fleet-badge .icon-core img {
        width: 22px; height: auto; z-index: 3;
        filter: drop-shadow(0 2px 4px rgba(58,123,213,0.3));
        animation: floatY 3s ease-in-out infinite;
      }

      .fleet-badge .badge-label {
        font-size: 13px; font-weight: 800; letter-spacing: 0.5px;
        background: linear-gradient(135deg, #3A7BD5 0%, #00D2FF 100%);
        -webkit-background-clip: text; background-clip: text;
        -webkit-text-fill-color: transparent;
        position: relative; padding-right: 20px;
      }
      .fleet-badge .badge-label::after {
        content: '⚡'; position: absolute; right: 0; top: 50%;
        transform: translateY(-50%); font-size: 12px;
        animation: lightningBlink 1.5s ease-in-out infinite;
      }

      @keyframes rotateConic { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
      @keyframes lightningBlink { 0%,100% { opacity: 1; transform: translateY(-50%) scale(1); } 50% { opacity: 0.6; transform: translateY(-50%) scale(1.3); } }

      /* ────────────────────────────────────────────────────
         OFFCANVAS FILTER PANEL
      ──────────────────────────────────────────────────── */
      .offcanvas {
        width: 320px;
        backdrop-filter: blur(20px);
        background: rgba(255,255,255,0.95) !important;
        border-right: 1px solid rgba(0,0,0,0.05);
      }
      .offcanvas-header {
        padding: 1.25rem 1.5rem;
        border-bottom: 1px solid rgba(0,0,0,0.05);
      }
      .offcanvas-body { padding: 1.25rem 1.5rem; }

      /* ────────────────────────────────────────────────────
         FILTER FORM ELEMENTS
      ──────────────────────────────────────────────────── */
      .icon-container { display: flex; flex-wrap: wrap; gap: 10px; }
      .filter-icon {
        width: 48px; height: 48px;
        cursor: pointer;
        border: 2px solid transparent;
        border-radius: 14px;
        object-fit: contain;
        transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
        background: rgba(241,245,249,0.6);
        padding: 4px;
      }
      .filter-icon:hover {
        border-color: rgba(59,130,246,0.3);
        transform: scale(1.08);
        box-shadow: 0 4px 12px rgba(59,130,246,0.15);
      }
      .filter-icon.full { border-radius: 8px; }
      .filter-icon.selected {
        border-color: #3b82f6;
        background: rgba(59,130,246,0.08);
        box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
      }
      .filter-icon.disabled { opacity: 0.35; }

      .form-select, .form-control {
        border-radius: 12px;
        border: 1.5px solid #e2e8f0;
        padding: 10px 14px;
        font-size: 14px;
        transition: all 0.2s ease;
      }
      .form-select:focus, .form-control:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
      }

      /* ────────────────────────────────────────────────────
         BADGES / PILLS
      ──────────────────────────────────────────────────── */
      .badge {
        border-radius: 25px; padding: 10px 16px;
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: 600;
      }
      .badge i { margin-right: 5px; }

      /* ────────────────────────────────────────────────────
         MODAL TAB NAVIGATION
      ──────────────────────────────────────────────────── */
      .nav-tabs-container {
        overflow-x: auto; white-space: nowrap;
        border-bottom: 1px solid #e2e8f0; margin-bottom: 16px;
      }
      .nav-tabs {
        display: flex; border-bottom: none;
        padding: 10px 0; scroll-behavior: smooth;
      }
      .nav-tabs .nav-item { margin-right: 8px; }
      .nav-tabs .nav-link {
        border: none; border-radius: 50px;
        padding: 8px 18px;
        background: rgba(241,245,249,0.8);
        color: #3b82f6;
        font-size: 13px; font-weight: 600;
        transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      }
      .nav-tabs .nav-link.active {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white; box-shadow: 0 4px 12px rgba(59,130,246,0.3);
      }
      .nav-tabs .nav-link:hover:not(.active) {
        background: rgba(59,130,246,0.08);
        color: #1e40af;
      }

      /* ────────────────────────────────────────────────────
         TAB CONTENT
      ──────────────────────────────────────────────────── */
      .tab-content {
        background: white;
        padding: 16px;
        border-radius: 16px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      }
      .scrollable-content { max-height: 220px; overflow-y: auto; }
      .scrollable-content::-webkit-scrollbar { width: 6px; }
      .scrollable-content::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .scrollable-content::-webkit-scrollbar-track { background: transparent; }

      /* ────────────────────────────────────────────────────
         STATION DETAIL ITEMS
      ──────────────────────────────────────────────────── */
      .separator { border-bottom: 1px solid #e2e8f0; margin: 0.75rem 0; }
      .info {
        font-size: 14px; color: #64748b;
        display: flex; align-items: center; margin-bottom: 0.5rem;
      }
      .info .icon { color: #ef4444; margin-right: 8px; font-size: 1.1rem; }

      .product-icon, .item-icon { width: 40px; height: 40px; margin-right: 8px; }
      .round { border-radius: 50%; object-fit: cover; }
      .full { width: 32px; height: auto; object-fit: cover; }

      .product-row, .service-row, .description-row, .promotion-row {
        display: flex; flex-wrap: wrap; gap: 10px;
      }

      /* ────────────────────────────────────────────────────
         GO BUTTON
      ──────────────────────────────────────────────────── */
      .go-button {
        width: 68px; height: 68px; font-size: 16px;
        display: flex; justify-content: center; align-items: center;
        border-radius: 50%; border: none;
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        color: white; font-weight: 800;
        box-shadow: 0 4px 16px rgba(59,130,246,0.4);
        transition: all 0.3s ease;
        cursor: pointer;
      }
      .go-button:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 25px rgba(59,130,246,0.5);
      }
      .go-button.pulse { animation: glowPulse 2s ease-in-out infinite; }
      .icon-background {
        background: rgba(59,130,246,0.1);
        color: #3b82f6; border-radius: 50%;
        width: 36px; height: 36px;
        display: flex; justify-content: center; align-items: center;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .icon-background:hover {
        background: rgba(59,130,246,0.2);
        transform: scale(1.1);
      }

      /* ────────────────────────────────────────────────────
         NEARBY STATIONS LIST
      ──────────────────────────────────────────────────── */
      .list-group-item {
        display: flex; align-items: center;
        padding: 12px; border: none;
        border-radius: 16px;
        background: rgba(255,255,255,0.8);
        backdrop-filter: blur(8px);
        box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        margin-bottom: 10px;
        transition: all 0.25s ease;
      }
      .list-group-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      }
      .list-group-item img {
        width: 90px; height: 90px;
        margin-right: 12px; border-radius: 14px; object-fit: cover;
      }
      .station-details { flex-grow: 1; }
      .station-details h6 { margin: 0 0 4px 0; font-weight: 700; font-size: 14px; color: #1e293b; }
      .station-details p { margin: 0; color: #64748b; font-size: 12px; line-height: 1.4; }
      .station-details .icons { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
      .station-details .icons img { width: 24px; height: 24px; border-radius: 50%; }
      .closed-station { background-color: rgba(254,202,202,0.5); }
      .open-station { background-color: white; }

      /* ────────────────────────────────────────────────────
         IMAGE PREVIEW MODAL
      ──────────────────────────────────────────────────── */
      .modal-content.shadow-lg {
        box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        border-radius: 1.5rem;
      }
      .img-fluid.shadow {
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        border-radius: 16px;
      }

      /* Under Construction */
      .blink-border { animation: pulseBorder 2s infinite; }
      @keyframes pulseBorder { 0%,100% { border: 2px solid #ef4444; } 50% { border: 2px solid transparent; } }

      /* ────────────────────────────────────────────────────
         RESPONSIVE
      ──────────────────────────────────────────────────── */
      @media (max-width: 1024px) {
        .offcanvas { width: 340px; }
        .brand-badge img { width: 80px; }
      }
      @media (max-width: 768px) {
        .offcanvas { width: 80%; }
        .right-buttons { right: 12px; gap: 10px; }
        .right-buttons .fab-btn { width: 44px; height: 44px; font-size: 16px; border-radius: 14px; }
        .brand-badge { bottom: 12px; left: 12px; padding: 6px 12px 6px 6px; border-radius: 12px; }
        .brand-badge img { width: 70px; }
        .brand-badge .brand-text { font-size: 10px; }
        .fleet-badge { top: 12px; padding: 8px 16px 8px 10px; }
        .fleet-badge .badge-label { font-size: 12px; }
      }
      @media (max-width: 576px) {
        .offcanvas { width: 90%; }
        .right-buttons { right: 10px; gap: 8px; }
        .right-buttons .fab-btn { width: 40px; height: 40px; font-size: 14px; border-radius: 12px; }
        .brand-badge { bottom: 8px; left: 8px; padding: 5px 10px 5px 5px; border-radius: 10px; }
        .brand-badge img { width: 60px; }
        .brand-badge .brand-text { display: none; }
        .fleet-badge { top: 10px; padding: 6px 14px 6px 8px; border-radius: 30px; }
        .fleet-badge .badge-label { font-size: 11px; padding-right: 16px; }
        .fleet-badge .icon-core { width: 20px; height: 20px; }
        .fleet-badge .icon-core img { width: 18px; }
        .badge { padding: 6px 10px; font-size: 12px; }
      }

      /* Clear filter button */
      #clearAllButton { display: none; }
      #toggle3DBtn.active { background-color:#3b82f6 !important; border:2px solid #1d4ed8; }
      #toggle3DBtn.active i { color:#fff !important; }
      .maplibregl-ctrl-attrib { display:none !important; }

      /* Custom button styles */
      .btn-modern-primary {
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white; border: none; border-radius: 12px;
        padding: 10px 24px; font-weight: 600; font-size: 14px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(59,130,246,0.3);
      }
      .btn-modern-primary:hover {
        transform: translateY(-1px); color: white;
        box-shadow: 0 6px 20px rgba(59,130,246,0.4);
      }
      .btn-modern-danger {
        background: linear-gradient(135deg, #ef4444, #dc2626);
        color: white; border: none; border-radius: 12px;
        padding: 10px 24px; font-weight: 600; font-size: 14px;
        transition: all 0.3s ease;
        box-shadow: 0 4px 12px rgba(239,68,68,0.3);
      }
      .btn-modern-danger:hover {
        transform: translateY(-1px); color: white;
        box-shadow: 0 6px 20px rgba(239,68,68,0.4);
      }

      .rounded-image { border-radius: 16px; }
    </style>
  </head>
  <body class="bg-slate-50">
    <div class="map-container">
      <!-- ══════════ MAP ══════════ -->
      <div id="map"></div>

      <!-- ══════════ RIGHT FLOATING ACTION BUTTONS ══════════ -->
      <div class="right-buttons">
        <button class="fab-btn" data-bs-toggle="offcanvas" data-bs-target="#filterOffcanvas" title="Filter Stations">
          <i class="fa fa-filter"></i>
        </button>
        <button class="fab-btn" id="myLocationBtn" title="My Location">
          <i class="fa fa-location-arrow"></i>
        </button>
        <button class="fab-btn" id="recenterBtn" title="Recenter to My Location">
          <i class="fas fa-crosshairs"></i>
        </button>
        <button class="fab-btn" id="nearbyStationsBtn" title="Nearby Stations">
          <i class="fa fa-bars"></i>
        </button>
        <button class="fab-btn" id="promotionBtn" data-bs-toggle="modal" data-bs-target="#promotionModal" title="Promotions">
          <i class="fa fa-bullhorn"></i>
          <span class="fab-notification" id="promotionNotificationDot"></span>
        </button>
        <button class="fab-btn" onclick="window.location.href='https://ptt-station.netlify.app/#admin'" title="All Stations">
          <i class="fas fa-map-location-dot"></i>
        </button>
        <button class="fab-btn" onclick="window.location.href='https://ptt-station.netlify.app/#ev'" title="EV Stations">
          <i class="fas fa-charging-station"></i>
        </button>
        <button class="fab-btn" id="toggle3DBtn" title="Toggle 3D View">
          <i class="fas fa-cube"></i>
        </button>
        <button class="fab-btn fab-danger clear-filter-button" id="clearAllButton" title="Clear Filters">
          <i class="fas fa-times"></i>
        </button>
      </div>

      <!-- ══════════ BRAND BADGE (Bottom Left) ══════════ -->
      <div class="brand-badge">
        <img src="./pictures/logo_Station.png" alt="PTT Station" />
        <span class="brand-text">Oil Retail System</span>
      </div>

      <!-- ══════════ FLEET CARD BADGE (Top Center) ══════════ -->
      <div class="fleet-badge" id="evLoop">
        <div class="icon-core">
          <div class="ripple-ring"></div>
          <div class="ripple-ring"></div>
          <div class="ripple-ring"></div>
          <img src="./pictures/fleet.png" alt="Fleet Card" />
        </div>
        <span class="badge-label">FLEET CARD</span>
      </div>
    </div>

    <!-- ══════════ OFFCANVAS — FILTER PANEL ══════════ -->
    <div class="offcanvas offcanvas-start" tabindex="-1" id="filterOffcanvas" aria-labelledby="filterOffcanvasLabel">
      <div class="offcanvas-header">
        <img src="./pictures/logo_Station.png" alt="Logo" class="img-fluid" style="max-width: 120px;" />
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <form id="filterForm">
          <div class="mb-3">
            <label for="province" class="form-label text-sm font-semibold text-slate-700">Province</label>
            <select class="form-select" id="province">
              <option value>All</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="title" class="form-label text-sm font-semibold text-slate-700">Station</label>
            <select class="form-select" id="title">
              <option value>ALL</option>
            </select>
          </div>
          <div class="mb-4">
            <h5 class="text-sm font-bold text-slate-800 mb-2">Product</h5>
            <div id="product-icons" class="icon-container"></div>
          </div>
          <div class="mb-4">
            <h5 class="text-sm font-bold text-slate-800 mb-2">Other Product</h5>
            <div id="other-product-icons" class="icon-container"></div>
          </div>
          <div class="mb-4">
            <h5 class="text-sm font-bold text-slate-800 mb-2">Service</h5>
            <div id="service-icons" class="icon-container"></div>
          </div>
          <div class="mb-4">
            <h5 class="text-sm font-bold text-slate-800 mb-2">Description</h5>
            <div id="description-icons" class="icon-container"></div>
          </div>
          <div class="mb-4">
            <h5 class="text-sm font-bold text-slate-800 mb-2">Promotion</h5>
            <div id="promotion-icons" class="icon-container"></div>
          </div>
          <div class="mb-4">
            <h5 class="text-sm font-bold text-slate-800 mb-2">Status</h5>
            <div id="status-icons" class="icon-container"></div>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-modern-primary flex-fill">
              <i class="fas fa-check me-1"></i> Apply Filter
            </button>
            <button type="button" class="btn btn-modern-danger" id="clearAllButton">
              <i class="fas fa-times me-1"></i> Clear
            </button>
          </div>
        </form>
      </div>
    </div>

    <!-- ══════════ MODAL — STATION DETAIL ══════════ -->
    <div class="modal fade" id="markerModal" tabindex="-1" aria-labelledby="markerModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header no-border-bottom">
            <img src="./pictures/logo_Station.png" alt="Logo" class="img-fluid" style="max-width: 120px;" />
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="markerModalBody"></div>
        </div>
      </div>
    </div>

    <!-- ══════════ OFFCANVAS — NEARBY STATIONS ══════════ -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="nearbyStationsOffcanvas" aria-labelledby="nearbyStationsOffcanvasLabel">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title font-bold text-slate-800" id="nearbyStationsOffcanvasLabel">
          <i class="fas fa-map-marker-alt text-blue-500 me-2"></i>Nearby Stations
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
      </div>
      <div class="offcanvas-body">
        <ul id="nearbyStationsList" class="list-group"></ul>
      </div>
    </div>

    <!-- ══════════ MODAL — IMAGE PREVIEW ══════════ -->
    <div class="modal fade" id="imagePreviewModal" tabindex="-1" aria-labelledby="imagePreviewModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content shadow-lg">
          <div class="modal-header border-0">
            <h5 class="modal-title font-bold text-slate-800" id="imagePreviewModalLabel">
              <i class="fas fa-image text-blue-500 me-2"></i>Image Preview
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body p-4">
            <img id="imagePreview" src alt="Image Preview" class="img-fluid rounded-2xl shadow-lg w-full" />
          </div>
        </div>
      </div>
    </div>

    <!-- ══════════ MODAL — PROMOTIONS ══════════ -->
    <div class="modal fade" id="promotionModal" tabindex="-1" aria-labelledby="promotionModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content shadow-lg">
          <div class="modal-header">
            <h5 class="modal-title font-bold text-slate-800" id="promotionModalLabel">
              <i class="fas fa-bullhorn text-amber-500 me-2"></i>Promotions
            </h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <ul class="nav nav-tabs" id="promotionTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="all-tab" data-bs-toggle="tab" data-bs-target="#all" type="button" role="tab" aria-controls="all" aria-selected="true">All</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="promotion-tab" data-bs-toggle="tab" data-bs-target="#promotion1" type="button" role="tab" aria-controls="promotion1" aria-selected="false">Season</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="opening-tab" data-bs-toggle="tab" data-bs-target="#opening" type="button" role="tab" aria-controls="opening" aria-selected="false">New Opening</button>
              </li>
            </ul>
            <div class="tab-content mt-3" id="promotionTabContent">
              <div class="tab-pane fade show active" id="all" role="tabpanel" aria-labelledby="all-tab">
                <div id="promotionContainerAll"></div>
              </div>
              <div class="tab-pane fade" id="promotion1" role="tabpanel" aria-labelledby="promotion-tab">
                <div id="promotionContainerPromotions"></div>
              </div>
              <div class="tab-pane fade" id="opening" role="tabpanel" aria-labelledby="opening-tab">
                <div id="promotionContainerOpenings"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ══════════ SCRIPTS ══════════ -->
    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

    <script>
      window.PTT_PAGE_CONFIG = {
        dataUrl: "markers_admin_fleet.json",
        autoSelectFilter: { container: "service-icons", item: "Fleet card" },
        showStatusFilter: true,
      };
    </script>

    <script src="./js/config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/routeService.js"></script>
    <script src="./js/mapManager.js"></script>
    <script src="./js/modalRenderer.js"></script>
    <script src="./js/filterManager.js"></script>
    <script src="./js/nearbyManager.js"></script>
    <script src="./js/promotionManager.js"></script>
    <script src="./js/oilPriceManager.js"></script>
    <script src="./js/app.js"></script>
  </body>
</html>
